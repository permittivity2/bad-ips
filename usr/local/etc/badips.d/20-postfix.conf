# Postfix Plugin Configuration for Bad IPs
#
# This plugin monitors Postfix logs for authentication failures and protocol violations.
# It implements threshold-based detection for distributed brute force attacks.
#
# Key Features:
# - Username-based SASL failure tracking (detects distributed attacks on same account)
# - IP-based protocol violation tracking (immediate blocking)
# - Escalating block durations for persistent attackers
# - Automatic cleanup and offense count reset after 30 days of good behavior

[Plugins:Postfix]
active = 1
name = Postfix

# Journal monitoring configuration
journal_unit = postfix@-.service, postfix.service
fetch_interval = 5
initial_fetch = 300

# Cleanup interval (seconds) for old tracking data
cleanup_interval = 300

# =============================================================================
# THRESHOLD CONFIGURATION
# =============================================================================
#
# Format: category_count = number of violations to trigger blocking
#         category_window = time window in seconds

# PROTOCOL VIOLATIONS (immediate per-IP blocking)
# These are clearly malicious and trigger immediate blocking
protocol_violations_count = 1
protocol_violations_window = 1

# SASL AUTHENTICATION FAILURES (username-based threshold)
# When N attempts to the SAME USERNAME occur within the window,
# block ALL IPs that attempted that username
# Important: This is USERNAME-BASED to detect distributed attacks on same account
sasl_failures_count = 3
sasl_failures_window = 600

# RELAY ACCESS DENIALS (IP-based threshold)
# Spam/relay attempts - IP-based tracking
relay_denials_count = 2
relay_denials_window = 300

# SSL ERRORS (optional, low priority)
# Certificate scanner errors (Censys, etc.) - usually not blocking-worthy
# Set to high value to avoid false positives
ssl_errors_count = 5
ssl_errors_window = 600

# =============================================================================
# ESCALATING BLOCK DURATIONS (TTL in seconds)
# =============================================================================
#
# Block duration increases with each repeat offense.
# This applies per-IP for protocol violations and relay denials,
# and per-USERNAME for SASL authentication failures.

escalation_ttl_1 = 600      # 1st offense: 10 minutes
escalation_ttl_2 = 3600     # 2nd offense: 1 hour
escalation_ttl_3 = 21600    # 3rd offense: 6 hours
escalation_ttl_4 = 86400    # 4th offense: 24 hours
escalation_ttl_5 = 604800   # 5th+ offense: 7 days (maximum)

# =============================================================================
# PATTERN DEFINITIONS
# =============================================================================
#
# Format: pattern_CATEGORY_NN = Description:::Regex Pattern
# Where:
#   CATEGORY = protocol_violations, sasl_failures, relay_denials, or ssl_errors
#   NN = two-digit number (01, 02, etc.) for uniqueness
#   Description = short description for logging
#   Regex Pattern = regular expression to match in log lines

# --- PROTOCOL VIOLATIONS (immediate per-IP blocking) ---
pattern_protocol_violations_01 = Non-SMTP command:::non-SMTP command from
pattern_protocol_violations_02 = Improper pipelining:::improper command pipelining after CONNECT from
pattern_protocol_violations_03 = Illegal address syntax:::Illegal address syntax from

# --- SASL AUTHENTICATION FAILURES (username-based threshold) ---
# Threshold: 3 attempts to SAME USERNAME in 10 minutes
# Action: Block ALL IPs that attempted the username (escalating TTL)
pattern_sasl_failures_01 = SASL LOGIN failed:::SASL LOGIN authentication failed
pattern_sasl_failures_02 = SASL PLAIN failed:::SASL PLAIN authentication failed

# --- RELAY ACCESS DENIALS (IP-based threshold) ---
# Threshold: 2 attempts from SAME IP in 5 minutes
# Action: Block IP (escalating TTL)
pattern_relay_denials_01 = Relay denied:::Relay access denied

# --- SSL ERRORS (optional, low priority) ---
# These are usually from certificate scanners (Censys, Shodan, etc.)
# Threshold is set high to avoid false positives
# Threshold: 5 errors from SAME IP in 10 minutes
# Action: Block IP (escalating TTL) - uncomment in plugin code to enable
pattern_ssl_errors_01 = SSL accept error:::SSL_accept error from
pattern_ssl_errors_02 = TLS library problem:::warning: TLS library problem
